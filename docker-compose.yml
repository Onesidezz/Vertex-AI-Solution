version: '3.8'

services:
  app:
    build: .
    container_name: document-processing-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=DocumentProcessingDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true
      - ONNX__ModelPath=/app/model/model.onnx
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      - FileStorage__BasePath=/app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - C:/Users/ukhan2/Desktop/ONNXModel:/app/model
    depends_on:
      - sqlserver
      - qdrant
    restart: unless-stopped
    networks:
      - document-processing-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: document-processing-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - document-processing-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: document-processing-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - document-processing-network

volumes:
  sqlserver_data:
  qdrant_storage:

networks:
  document-processing-network:
    driver: bridge